<!doctype html>
<notebook theme="midnight">
  <title>Dark flaring in the Permian Basin</title>

  <script id="summary" output="summary" type="application/sql" database="../data/dark_flaring.duckdb" hidden>
    SELECT is_dark,
      count(*) AS detection_days,
      count(DISTINCT flare_id) AS flare_sites,
      round(sum(rh_mw), 0) AS total_rh_mw,
      min(date) AS earliest, max(date) AS latest
    FROM dark_flares GROUP BY is_dark
  </script>

  <script id="top_flares" output="topFlares" type="application/sql" database="../data/dark_flaring.duckdb" hidden>
    SELECT * FROM top_dark_flares
  </script>

  <script id="dark_by_year" output="darkByYear" type="application/sql" database="../data/dark_flaring.duckdb" hidden>
    SELECT flare_id,
      extract(year FROM date)::INTEGER AS year,
      round(avg(vnf_lat), 4) AS lat, round(avg(vnf_lon), 4) AS lon,
      COALESCE(operator_name, 'Unknown') AS operator,
      confidence,
      count(*) AS detection_days, round(sum(rh_mw), 1) AS total_rh_mw
    FROM dark_flares WHERE is_dark
    GROUP BY flare_id, year, operator, confidence
  </script>

  <script id="by_operator" output="byOperator" type="application/sql" database="../data/dark_flaring.duckdb" hidden>
    WITH ranked AS (
      SELECT COALESCE(operator_name, 'Unknown') AS operator,
        count(DISTINCT flare_id) AS sites,
        count(*) AS detection_days,
        round(sum(rh_mw), 0) AS rh_mw
      FROM dark_flares WHERE is_dark
        AND confidence IN ('sole', 'majority')
      GROUP BY operator ORDER BY rh_mw DESC LIMIT 15
    )
    SELECT operator, 'Radiant heat (MW)' AS metric, rh_mw AS value FROM ranked
    UNION ALL
    SELECT operator, 'Detection-days' AS metric, detection_days AS value FROM ranked
  </script>

  <script id="quarterly" output="quarterly" type="application/sql" database="../data/dark_flaring.duckdb" hidden>
    SELECT date_trunc('quarter', date) AS quarter,
      is_dark,
      count(*) AS detection_days,
      count(DISTINCT flare_id) AS sites,
      round(sum(rh_mw), 0) AS total_rh_mw
    FROM dark_flares
    GROUP BY 1, 2 ORDER BY 1
  </script>

  <script id="counties" type="module">
    const us = await fetch("https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json").then(r => r.json());
    const countyFeatures = topojson.feature(us, us.objects.counties);
    const states = topojson.feature(us, us.objects.states);
    const txCounties = {type: "FeatureCollection", features: countyFeatures.features.filter(d => d.id.startsWith("48"))};
    const tx = {type: "FeatureCollection", features: states.features.filter(d => d.id === "48")};
  </script>

  <script id="permit_era" output="permitEra" type="application/sql" database="../data/dark_flaring.duckdb" hidden>
    SELECT is_dark, count(*) AS det_days, count(DISTINCT flare_id) AS sites,
      round(sum(rh_mw), 0) AS rh
    FROM dark_flares WHERE date >= '2023-10-01'
    GROUP BY 1
  </script>

  <script id="header" type="text/markdown">
    # Dark flaring in the Permian Basin

    Satellite flare detections ([VIIRS Nightfire](https://eogdata.mines.edu/products/vnf/)) matched to [SWR 32 permitted flare locations](https://webapps.rrc.state.tx.us/swr32/publicquery.xhtml), then checked against active permit dates. Upstream production sites only — midstream gas plants, compressor stations, and refineries excluded.

    **${topFlares.length} dark flare sites** with **${d3.sum(topFlares, d => d.detection_days).toLocaleString()} detection-days** of unpermitted flaring since Q4 2023. **${Math.round(100 * (permitEra.find(d => d.is_dark)?.det_days ?? 0) / d3.sum(permitEra, d => d.det_days))}%** of detection-days at matched upstream sites lack a valid SWR 32 exception permit.
  </script>

  <script id="year_select" type="module">
    const years = Array.from(new Set(darkByYear.map(d => d.year))).sort();
    const selectedYear = view(Inputs.range([years[0], years[years.length - 1]], {
      step: 1, value: years[years.length - 1], label: "Year"
    }));
  </script>

  <script id="map" type="module">
    const filtered = darkByYear.filter(d => d.year === selectedYear);

    display(Plot.plot({
      projection: {type: "mercator", domain: {type: "MultiPoint", coordinates: [[-104.5, 30.5], [-100.0, 33.1]]}},
      width: 960,
      height: 700,
      marginTop: 10,
      color: {scheme: "YlOrRd", reverse: true, type: "log", domain: [0.1, d3.max(darkByYear, d => d.total_rh_mw)], label: "Radiant heat (MW)", legend: true},
      r: {range: [3, 30], type: "sqrt", domain: [0.1, d3.max(darkByYear, d => d.total_rh_mw)]},
      marks: [
        Plot.geo(txCounties, {fill: "#1a1a2e", stroke: "#2a2a3e"}),
        Plot.geo(tx, {fill: "none", stroke: "#555", strokeWidth: 1.5}),
        Plot.dot(filtered, {
          x: "lon", y: "lat",
          r: "total_rh_mw",
          fill: "total_rh_mw",
          stroke: "#fff",
          strokeWidth: 0.5,
          tip: true,
          title: d => `${d.operator}${d.confidence === 'contested' ? ' (contested)' : ''}\n${d.detection_days} days, ${d.total_rh_mw} MW`
        })
      ]
    }));
  </script>

  <script id="hr1" type="text/html"><hr></script>

  <script id="operator_header" type="text/markdown">
    ## Top operators by unpermitted flaring

    Operators attributed by matching dark flare sites to the nearest SWR 32 permit location. Sites where multiple operators have overlapping permit coverage are excluded (${d3.sum(byOperatorContested, d => d.sites)} contested sites, ${d3.sum(byOperatorContested, d => d.permit_era_days).toLocaleString()} detection-days).
  </script>

  <script id="by_operator_contested" output="byOperatorContested" type="application/sql" database="../data/dark_flaring.duckdb" hidden>
    SELECT COALESCE(operator_name, 'Unknown') AS operator,
      count(DISTINCT flare_id) AS sites,
      sum(CASE WHEN date >= '2023-10-01' THEN 1 ELSE 0 END) AS permit_era_days,
      round(sum(CASE WHEN date >= '2023-10-01' THEN rh_mw ELSE 0 END), 0) AS permit_era_rh_mw
    FROM dark_flares WHERE is_dark AND confidence = 'contested'
    GROUP BY operator ORDER BY permit_era_rh_mw DESC
  </script>

  <script id="operator_chart" type="module">
    const sortOrder = [...new Set(byOperator.filter(d => d.metric === "Radiant heat (MW)").map(d => d.operator))];
    display(Plot.plot({
      width: 960,
      height: 400,
      marginLeft: 250,
      fx: {label: null, padding: 0.15, domain: ["Radiant heat (MW)", "Detection-days"]},
      x: {label: null, grid: true},
      y: {label: null, domain: sortOrder},
      color: {scheme: "YlOrRd", reverse: true, type: "log"},
      marks: [
        Plot.barX(byOperator, {fx: "metric", y: "operator", x: "value", fill: "value", tip: true}),
        Plot.ruleX([0])
      ]
    }));
  </script>

  <script id="hr2" type="text/html"><hr></script>

  <script id="trend_header" type="text/markdown">
    ## Quarterly trend
    Approved SWR 32 permits in our data begin in Q4 2023. Since then, **${Math.round(100 * (permitEra.find(d => d.is_dark)?.det_days ?? 0) / d3.sum(permitEra, d => d.det_days))}%** of detection-days at matched upstream sites remain unpermitted.
  </script>

  <script id="quarterly_chart" type="module">
    display(Plot.plot({
      width: 960,
      height: 350,
      x: {label: null},
      y: {label: "Detection-days", grid: true},
      color: {domain: [false, true], range: ["#f5deb3", "#e25822"], legend: true,
        tickFormat: d => d ? "Dark" : "Permitted"},
      marks: [
        Plot.rectY(quarterly, Plot.stackY({order: (d) => d.is_dark ? 1 : 0, x: "quarter", interval: "quarter", y: "detection_days", fill: "is_dark", tip: true})),
        Plot.ruleY([0])
      ]
    }));
  </script>

  <script id="hr3" type="text/html"><hr></script>

  <script id="yearly" output="yearly" type="application/sql" database="../data/dark_flaring.duckdb" hidden>
    SELECT extract(year FROM date)::INTEGER AS year,
      count(*) AS detection_days,
      count(DISTINCT flare_id) AS sites,
      round(sum(rh_mw), 0) AS total_rh_mw
    FROM dark_flares WHERE is_dark
    GROUP BY 1 ORDER BY 1
  </script>

  <script id="yearly_chart" type="module">
    display(Plot.plot({
      title: "Unpermitted flare detections by year",
      width: 960,
      height: 300,
      x: {label: "Year", tickFormat: "d"},
      y: {label: "Detection-days", grid: true},
      marks: [
        Plot.barY(yearly, {x: "year", y: "detection_days", fill: "#e25822", tip: true,
          title: d => `${d.year}: ${d.detection_days.toLocaleString()} detection-days\n${d.sites} sites, ${d.total_rh_mw.toLocaleString()} MW`}),
        Plot.ruleY([0])
      ]
    }));
  </script>


</notebook>
