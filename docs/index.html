  <script id="header" type="text/markdown">
    # Dark flaring in the Permian Basin

    Satellite flare detections ([VIIRS Nightfire](https://eogdata.mines.edu/products/vnf/)) matched to [SWR 32 permitted flare locations](https://webapps.rrc.state.tx.us/swr32/publicquery.xhtml), then checked against active permit dates. Upstream production sites only.

    **${headline[0].dark_sites} dark flare sites** with **${d3.format(",")(headline[0].dark_days)} detection-days** of unpermitted flaring (**${headline[0].pct_dark}%** of all detection-days). Self-reported flaring volumes suggest **${headline[0].unpermitted_bcf} Bcf** (${headline[0].pct_reported_unpermitted}%) was flared outside permitted windows.
  </script>

  <script id="year_select" type="module">
    const years = Array.from(new Set(sites.map(d => d.year))).sort();
    const selectedYear = view(Inputs.range([years[0], years[years.length - 1]], {step: 1, value: years[years.length - 1], label: "Year"}));
  </script>

  <script id="map" type="module">
    display(Plot.plot({
      projection: {type: "mercator", domain: {type: "MultiPoint", coordinates: [[-104.5, 30.5], [-100.0, 33.1]]}},
      width: 960, height: 700, marginTop: 10,
      color: {scheme: "YlOrRd", reverse: true, domain: [0, d3.max(sites, d => d.avg_rh_mw)], label: "Avg radiant heat (MW)", legend: true},
      r: {range: [2, 14], domain: [0, d3.max(sites, d => d.avg_rh_mw)]},
      marks: [
        Plot.geo(txCounties, {fill: "#1a1a2e", stroke: "#2a2a3e"}),
        Plot.geo(tx, {fill: "none", stroke: "#555", strokeWidth: 1.5}),
        Plot.dot(sites.filter(d => d.year === selectedYear), {
          x: "lon", y: "lat", r: "avg_rh_mw", fill: "avg_rh_mw",
          stroke: "#fff", strokeWidth: 0.5, tip: true,
          title: d => `${d.operator}${d.confidence === 'contested' ? ' (contested)' : ''}\n${d.detection_days} days, avg ${d.avg_rh_mw} MW`
        })
      ]
    }));
  </script>

  <script id="methodology" type="text/markdown">
    ## Methodology

    This analysis matches VIIRS Nightfire satellite flare detections to Texas Railroad Commission SWR 32 permitted flare locations, then checks each detection-day against active permit dates. The approach is deliberately conservative, giving operators the benefit of the doubt at every step:

    - **Matching**: flare sites matched to the nearest permitted location within **1 km** (Earthworks used 200 m)
    - **Permit status**: permits with status "Submitted" or "Hearing Pending" are counted as active, not just "Approved"
    - **Ambiguity**: if any nearby permit covers a detection date, that day is marked as permitted
    - **Exclusions**: EPA GHGRP non-upstream facilities (gas plants, refineries) within 1.5 km are excluded

    **Operator attribution** uses the nearest permitted flare location. Each site is classified as "sole" (one operator nearby), "majority" (nearest operator holds >50% of nearby permits), or "contested" (mixed). Contested sites are excluded from operator comparisons.

    **Reported flaring volumes** come from PDQ production reports (disposition code 04 = vented/flared). Unpermitted volumes are estimated by pro-rating monthly reported volumes by the fraction of that month not covered by any active SWR 32 permit on the lease.

    **Lease matching** uses spatial containment: VNF sites within lease footprints derived from Original Texas Land Survey (OTLS) polygons. Each well is spatial-joined to its containing OTLS survey; survey polygons are then unioned per lease to produce boundaries. Vertically stacked leases (different depth intervals on the same surface tract) share surface geometry.
    **Methane plumes** from Carbon Mapper and IMEO satellites are matched to wells and VNF sites within 1 km. Plumes near a VNF site are classified as "flaring" (if VIIRS detects a flare that day), "unlit" (VNF site present but no detection, indicating venting), or "wellpad" (near wells but no known flare).

    The 85% dark flaring rate in this analysis is consistent with Earthworks' finding of 69-84% unpermitted flares from direct helicopter surveys (2021), and with the RRC's own acknowledgment that the majority of observed flares lack permits.
  </script>
