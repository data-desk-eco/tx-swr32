<!doctype html>
<notebook theme="midnight">
  <title>Dark flaring in the Permian Basin</title>

  <script id="summary" output="summary" type="application/sql" database="../data/dark_flaring.duckdb" hidden>
    SELECT is_dark,
      count(*) AS detection_days,
      count(DISTINCT flare_id) AS flare_sites,
      round(avg(rh_mw), 2) AS avg_rh_mw,
      round(sum(rh_mw), 0) AS total_rh_mw,
      min(date) AS earliest,
      max(date) AS latest
    FROM dark_flares
    GROUP BY is_dark
  </script>

  <script id="top_flares" output="topFlares" type="application/sql" database="../data/dark_flaring.duckdb" hidden>
    SELECT flare_id, lease_district, lease_number, operator_no,
      COALESCE(operator_name, 'OP#' || operator_no) AS operator,
      round(avg(vnf_lat), 4) AS lat, round(avg(vnf_lon), 4) AS lon,
      count(*) AS detection_days, round(sum(rh_mw), 1) AS total_rh_mw,
      strftime(min(date), '%Y-%m-%d') AS first_seen,
      strftime(max(date), '%Y-%m-%d') AS last_seen
    FROM dark_flares
    WHERE is_dark
    GROUP BY flare_id, lease_district, lease_number, operator_no, operator_name
    ORDER BY total_rh_mw DESC
  </script>

  <script id="counties" type="module">
    const us = await fetch("https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json").then(r => r.json());
    const countyFeatures = topojson.feature(us, us.objects.counties);
    const states = topojson.feature(us, us.objects.states);
    const txCounties = {type: "FeatureCollection", features: countyFeatures.features.filter(d => d.id.startsWith("48"))};
    const tx = {type: "FeatureCollection", features: states.features.filter(d => d.id === "48")};
  </script>

  <script id="header" type="text/markdown">
    # Dark flaring in the Permian Basin
    Satellite flare detections ([VIIRS Nightfire](https://eogdata.mines.edu/products/vnf/)) spatially matched to the nearest RRC well within 750m, then checked against [SWR 32 exception permits](https://webapps.rrc.state.tx.us/swr32/publicquery.xhtml). A "dark" flare has no matching permit. ${topFlares.length} sites with ${d3.sum(topFlares, d => d.detection_days).toLocaleString()} detection-days of unpermitted flaring, 2012–2026.
  </script>

  <script id="map" type="module">
    display(Plot.plot({
      projection: {type: "mercator", domain: {type: "MultiPoint", coordinates: [[-104.5, 30.5], [-100.0, 33.1]]}},
      width: 960,
      height: 700,
      marginTop: 10,
      color: {scheme: "YlOrRd", type: "log", label: "Total RH (MW)", legend: true},
      r: {range: [4, 35], type: "sqrt"},
      marks: [
        Plot.geo(txCounties, {fill: "#1a1a2e", stroke: "#2a2a3e"}),
        Plot.geo(tx, {fill: "none", stroke: "#555", strokeWidth: 1.5}),
        Plot.dot(topFlares, {
          x: "lon", y: "lat",
          r: "total_rh_mw",
          fill: "total_rh_mw",
          stroke: "#fff",
          strokeWidth: 0.5,
          tip: true,
          title: d => `${d.operator}\nD${d.lease_district} L${d.lease_number}\n${d.detection_days} days, ${d.total_rh_mw} MW\n${d.first_seen} – ${d.last_seen}`
        })
      ]
    }));
  </script>

</notebook>
