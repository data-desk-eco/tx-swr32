name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Vendor JS dependencies
        run: scripts/vendor.sh

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp web/index.html web/app.js web/db.js web/enhance.js web/style.css dist/
          cp -r web/vendor dist/vendor
          cp -r web/data dist/data

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
