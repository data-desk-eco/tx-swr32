<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gaslight / dark flaring in the permian basin</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2240%22 fill=%22%23e74c3c%22/%3E%3C/svg%3E">
    <link rel="stylesheet" href="vendor/fonts/inter.css">
    <link rel="stylesheet" href="vendor/maplibre-gl.css">
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
    {
        "imports": {
            "/npm/apache-arrow@17.0.0/+esm": "./vendor/duckdb/apache-arrow.mjs",
            "/npm/tslib@2.6.3/+esm":         "./vendor/duckdb/tslib.mjs",
            "/npm/flatbuffers@24.3.25/+esm":  "./vendor/duckdb/flatbuffers.mjs"
        }
    }
    </script>
</head>
<body>
    <div id="map"></div>

    <div class="panel glass left-panel" id="left-panel">
        <div class="panel-header">
            <h1>gaslight</h1>
            <span class="collapse-toggle" id="collapse-toggle"><svg width="12" height="12" viewBox="0 0 12 12"><polyline points="2,8 6,4 10,8" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </div>
        <p class="subtitle">Dark flaring in the Permian</p>

        <div class="panel-body">
            <div class="separator"></div>
            <div class="stats">
                <div class="stat-row"><span class="stat-label">Flare sites</span><span class="stat-value" id="stat-sites">--</span></div>
                <div class="stat-row"><span class="stat-label">Dark rate</span><span class="stat-value" id="stat-dark-rate">--</span></div>
                <div class="stat-row"><span class="stat-label">Satellite MW</span><span class="stat-value" id="stat-mw">--</span></div>
            </div>

            <div class="separator"></div>
            <div class="filter-group">
                <div class="toggle-row" data-layer="flares">
                    <span class="filter-label">Flare sites</span>
                    <input type="checkbox" checked>
                </div>
<div class="toggle-row" data-layer="permits">
                    <span class="filter-label">Permit locations</span>
                    <input type="checkbox">
                </div>
                <div class="toggle-row" data-layer="plumes">
                    <span class="filter-label">Methane plumes</span>
                    <input type="checkbox">
                </div>
            </div>

            <div class="filter-group">
                <input type="text" class="operator-search" id="operator-search" placeholder="Filter by operator...">
            </div>
        </div>
    </div>

    <div class="panel glass right-panel hidden" id="detail-panel">
        <div class="detail-header">
            <div class="detail-header-text">
                <div class="detail-title-row"><span class="detail-id" id="detail-title"></span><span class="status-badge hidden" id="detail-badge"></span></div>
                <span class="detail-coords" id="detail-coords"></span>
            </div>
            <div class="overlap-nav hidden" id="overlap-nav">
                <button class="overlap-btn" id="overlap-prev"><svg width="12" height="12" viewBox="0 0 12 12"><polyline points="8,2 4,6 8,10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
                <span class="overlap-count" id="overlap-count"></span>
                <button class="overlap-btn" id="overlap-next"><svg width="12" height="12" viewBox="0 0 12 12"><polyline points="4,2 8,6 4,10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
            </div>
            <button class="close-btn" id="detail-close">&times;</button>
        </div>
        <div class="intensity-chart" id="intensity-chart"></div>
        <div id="detail-body"></div>
    </div>

    <div class="panel glass legend" id="legend">
        <div class="legend-body">
            <div class="legend-item"><span class="legend-src-wrap"><span class="legend-circle-fill" style="background: #ff4422;"></span></span>Dark flare</div>
            <div class="legend-item"><span class="legend-src-wrap"><span class="legend-circle-fill" style="background: #00ff88;"></span></span>Permitted flare</div>
            <div class="legend-item" id="legend-permits" style="display:none"><span class="legend-src-wrap"><span class="legend-circle-fill" style="background: #00ccff;"></span></span>Permit location</div>
            <div class="legend-item" id="legend-plumes" style="display:none"><span class="legend-src-wrap"><span class="legend-circle-fill" style="background: #ff44ff;"></span></span>Methane plume</div>
        </div>
    </div>

    <script src="vendor/maplibre-gl.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
