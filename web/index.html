    <title>gaslight / upstream flaring in the permian</title>

<body>
    <div id="map"></div>
    <div id="map-dim-overlay"></div>

    <div class="panel glass left-panel" id="left-panel">
        <div class="panel-header">
            <h1><a href="https://github.com/data-desk-eco/gaslight" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">gaslight</a></h1>
            <span class="collapse-toggle" id="collapse-toggle"><svg width="12" height="12" viewBox="0 0 12 12"><polyline points="2,8 6,4 10,8" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </div>
        <p class="subtitle">Upstream flaring in the Permian</p>

        <div class="map-centre" id="map-centre"></div>

        <div class="panel-body">
            <div class="separator"></div>
            <div class="stats">
                <div class="stat-row"><span class="stat-label">Flare sites</span><span class="stat-value" id="stat-sites">--</span></div>
                <div class="stat-row"><span class="stat-label">Satellite MW</span><span class="stat-value" id="stat-mw">--</span></div>
            </div>

            <div class="separator"></div>
            <div class="filter-group">
                <input type="text" class="operator-search" id="operator-search" placeholder="Filter by operator...">
            </div>

            <div class="filter-group">
                <div class="toggle-row" data-layer="flares">
                    <span class="layer-icon" style="border-color: var(--color-flare)"></span>
                    <span class="filter-label">Flare sites</span>
                    <input type="checkbox" checked>
                </div>
                <div class="toggle-row" data-layer="permits">
                    <span class="layer-icon" style="border-color: var(--color-permit)"></span>
                    <span class="filter-label">Permit locations</span>
                    <input type="checkbox" checked>
                </div>
                <div class="toggle-row" data-layer="plumes">
                    <span class="layer-icon" style="border-color: var(--color-plume)"></span>
                    <span class="filter-label">Methane plumes</span>
                    <input type="checkbox">
                </div>
                <div class="toggle-row" data-layer="infra">
                    <svg class="layer-icon-x" width="8" height="8" viewBox="0 0 8 8"><polygon points="4,1 7,7 1,7" fill="none" stroke="var(--color-infra)" stroke-width="1.5" stroke-linejoin="round"/></svg>
                    <span class="filter-label">Infrastructure</span>
                    <input type="checkbox">
                </div>
                <div class="toggle-row" data-layer="wells">
                    <svg class="layer-icon-x" width="8" height="8" viewBox="0 0 8 8"><line x1="1" y1="1" x2="7" y2="7" stroke="var(--color-well)" stroke-width="1.5" stroke-linecap="round"/><line x1="7" y1="1" x2="1" y2="7" stroke="var(--color-well)" stroke-width="1.5" stroke-linecap="round"/></svg>
                    <span class="filter-label">Oil/gas wells</span>
                    <input type="checkbox">
                </div>
            </div>
        </div>
    </div>

    <div class="panel glass right-panel hidden" id="detail-panel">
        <div class="detail-header">
            <div class="detail-header-text">
                <div class="detail-title-row"><span class="detail-id" id="detail-title"></span><span class="status-badge hidden" id="detail-badge"></span></div>
                <span class="detail-coords" id="detail-coords"></span>
            </div>
            <div class="overlap-nav hidden" id="overlap-nav">
                <button class="overlap-btn" id="overlap-prev"><svg width="12" height="12" viewBox="0 0 12 12"><polyline points="8,2 4,6 8,10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
                <span class="overlap-count" id="overlap-count"></span>
                <button class="overlap-btn" id="overlap-next"><svg width="12" height="12" viewBox="0 0 12 12"><polyline points="4,2 8,6 4,10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
            </div>
            <button class="close-btn" id="detail-close">&times;</button>
        </div>
        <div class="intensity-chart" id="intensity-chart"></div>
        <div id="detail-body"></div>
    </div>
